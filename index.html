<body style="padding: 0;margin: 0;box-sizing: border-box;background-color: black;">
    <!-- loading -->
    <section id="LoadingPage" class=""
        style="background-color: black;width: 100%;height: 100%;position: fixed;pointer-events: all !important;">
        <div class="loadingPage" id="LoadingPage-Pic">
            <div
                style="width: 50%;height: 20%;margin-top: 10%;display: flex;flex-direction: column;align-items: center;justify-content: center;">

                <div class="WAIAnim"
                    style="display: flex;flex-direction: column;align-items: center;justify-content: center;letter-spacing: 0.4rem;position: fixed;top: 0;">
                    <p
                        style="color: white;font-size: clamp(14px , 5.5vw , 3.5rem); display: flex;flex-direction: column; align-items: center;justify-content: center;margin-top: 10rem; font-family: 'Harry Potter', sans-serif;">
                        Who <span>Am </span> <span> I</span> <span class="Question">?</span></p>
                </div>
            </div>

            <div
                style="width: 90%;height: 15%;display: flex;flex-direction: column;align-items: center;justify-content: center;bottom: 0;margin-bottom: 1.5rem;">
                <div style="display: flex; background-color: rgb(168, 168, 168);width: 60%;height: 0.5rem;"
                    id="MaxLodingDiv">
                    <div style="background: linear-gradient(to right , gray , rgb(66, 66, 66));width: 0%;height: 100%;"
                        id="MidLodingDiv"></div>
                </div>
                <div id="typed-strings"
                    style="width: 95%;display: flex;flex-direction: row;align-items: center;justify-content: center;color: white;">
                    <p id="LoadingTextP" class="typed"> </p>
                </div>
            </div>
        </div>

        <p class="ClickAnim" id="ClickBtnLoadingPAge">Click</p>
    </section>
    <section id="LanSelectorSec" class="LanSecSelector">
        <div class="Select_Language_Div" id="LanSelectorDiv">
            <p class="S_Language-P">Select Language:</p>
            <div id="Lan-divs-Selector"
                style="display: flex;flex-direction: column;align-items: center;justify-content: space-between; width: 90%;height: 40%;">
                <div id="PersionSelectorLan"
                    style="overflow: hidden;display: flex;flex-direction: row;align-items: center;justify-content: space-between;  width: 100%;height: 45%;background-color: rgba(128, 128, 128, 0.183);border-radius: 0.5rem; border-color: gray;border-width: 0.02rem;border-style:solid;">
                    <img src="./loading_page-Pics/persian_P.PNG" style="width: 40%;filter: grayscale(1);"
                        alt="Persian-Language">
                    <p style="color: white;margin-right: 2.5rem;"> Persian ></p>
                </div>

                <div id="engSelectorLan"
                    style="overflow: hidden;display: flex;flex-direction: row;align-items: center;justify-content: space-between;  width: 100%;height: 45%;background-color: rgba(128, 128, 128, 0.183);border-radius: 0.5rem; border-color: gray;border-width: 0.02rem;border-style:solid;">
                    <img src="./loading_page-Pics/ENG_P.PNG" style="width: 40%;filter: grayscale(1);"
                        alt="English-Language">
                    <p style="color: white;margin-right: 2.5rem;"> English ></p>
                </div>
            </div>


        </div>
        <div id="LoadingpageIcon">
            <p>?</p>
        </div>
    </section>
    <section id="HomeSec" class="HomeSec">
        <!-- <p style="color: white;" id="UserInfo">User Info</p>
            <button id="adsShowing">Ads Showing...</button> -->


        <img src="./Carecter.png" id="Carecter_Home" alt="">
        <img src="./Craecter_BookGive.png" id="CarecterBook_Home" alt="">

        <div class="TextBoxHome">
            <span id="typed1"></span>
            <span id="typed2"></span>

        </div>
