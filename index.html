<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>A-CardGame</title>
    <link rel="stylesheet" href="./style/loading.css">
</head>

<body>
    <section class="MainSec">


        <!-- loading page -->
        <section class="LoadingSec" id="LoadingSec" >

            <div class="LDSD" id="LDSD">
                <img class="Loadingimg" id="Loadingimg" src="./imgs/NovaminStudio.png" alt="">
            </div>
        </section>

        <!-- Home Page  -->
        <section style="z-index: 98;" class="HomePage">
            <div
                style="width: 100%;height: 100%;display: flex;flex-direction: column;align-items: center;justify-content: space-between;">

                <div style="width: 100%;height: 18%;display: flex;flex-direction: row;">
                    <div
                        style="background: linear-gradient(to bottom , #95D3F5 , #F57FDB) ;width: 22%;height: 100%;display: flex;flex-direction: column;align-items: center;justify-content: space-around; border-radius: 0 0 0.5rem 0.5rem;">

                        <div
                            style="background-color: orangered;width: 60%;height: 40%;display: flex;flex-direction: row;align-items: center;justify-content: center;border-radius: 100%;">
                            <i>👤</i>
                        </div>
                        <div
                            style="background-color: rgba(255, 255, 255, 0);width: 60%;height: 40%;display: flex;flex-direction: row;align-items: center;justify-content: center;border-radius: 0% 0% 100% 100% ;">
                            <i>🔽</i>
                        </div>

                    </div>

                    <div
                        style="background: linear-gradient(to right , #95D3F5 , #F57FDB) ;width: 78%;height: 50%;display: flex;flex-direction: row;align-items: center;justify-content: end;border-radius: 0 0 0.5rem 0;">
                        <div
                            style="gap: 0.3rem; width: 50%;display: flex;flex-direction: row;align-items: center;justify-content: center;">
                            <i>🥇</i>
                            <p style="color: black;font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;">1,252</p>
                            <i style="background-color: greenyellow;width: auto;height: auto;border-radius: 50%;">➕</i>
                        </div>
                    </div>

                </div>


                <div id="starBox">
                </div>


                <div
                    style="width: 100%;height: 30%;display: flex;flex-direction: column;margin-bottom: 7rem; align-items: start;justify-content: start;">

                    <div
                        style="width: 100%;height: 50%;display: flex;flex-direction: row;align-items: center;justify-content: center;">
                        <input type="submit"
                            style="width: 60%;height: 100%;border-radius: 0.5rem;background-color: #c0ace84d;color: #2CAED5;font-size: 2rem; border-color: #2CAED5;"
                            value="Play">
                    </div>
                    <div style="width: 100%;height: 40%;">
                        <div
                            style="width: 100%; height: 100%;display: flex;flex-direction: row;align-items: center;justify-content: center;gap: 0.3rem;">
                            <input type="submit"
                                style="width: 30%;height: 90%;border-radius: 0.5rem;background-color: #c0ace84d;color: #2CAED5;font-size: 0.9rem; border-color: #2CAED5;"
                                value="Challenge">
                            <input type="submit"
                                style="width: 30%;height: 90%;border-radius: 0.5rem;background-color: #c0ace84d;color: #2CAED5;font-size: 0.9rem; border-color: #2CAED5;"
                                value="LeaderBoard">
                        </div>
                    </div>

                </div>



                <div style="background-color: #fff;width: 100%;height: 5%;background: linear-gradient(to bottom , rgba(128, 0, 128, 0) , rgba(55, 1, 55, 0.671));">
                </div>
            </div>
        </section>


    </section>


    <script src="./js/Main.js"></script>
</body>

</html>
