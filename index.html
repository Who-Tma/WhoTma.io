<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Document</title>
    
    <link rel="stylesheet" href="./css/style.css">
</head>

<body style="padding: 0;margin: 0;box-sizing: border-box;background-color: black;">
    <!-- loading -->
    <section id="LoadingPage" class="" style="background-color: black;width: 100%;height: 100%;position: fixed;">
        <div class="loadingPage" id="LoadingPage-Pic">
            <div
                style="width: 50%;height: 20%;margin-top: 10%;display: flex;flex-direction: column;align-items: center;justify-content: center;">

                <div class="WAIAnim"
                    style="display: flex;flex-direction: column;align-items: center;justify-content: center;font-family: Impact;letter-spacing: 0.4rem;">
                    <p style="color: white;font-size: 5.5rem;">Who</p>
                    <p style="color: rgb(226, 223, 223); display: flex;margin-top: -5rem;font-size: 3.5rem;">Am</p>
                    <p style="color: rgb(226, 223, 223); display: flex;margin-top: -2.5rem;font-size: 3rem;">I</p>
                    <p style="color: rgb(226, 223, 223); display: flex;margin-top: -2.5rem;font-size: 2rem;">?</p>
                </div>
            </div>
            <div
                style="width: 90%;height: 15%;display: flex;flex-direction: column;align-items: center;justify-content: center;gap: 1.2rem;">
                <div style="display: flex; background-color: aliceblue;width: 99%;height: 10%;" id="MaxLodingDiv">
                    <div style="background-color: gray;width: 0%;height: 100%;" id="MidLodingDiv"></div>
                </div>
                <div id="typed-strings"
                    style="width: 95%;font-size: 1.7rem;display: flex;flex-direction: row;align-items: center;justify-content: center;color: white;">
                    <p id="LoadingTextP" class="typed"> </p>
                </div>
            </div>
        </div>
        <p class="ClickAnim" style="display: none; color: aliceblue;font-size: 1.3rem;position: fixed; bottom: 0;right: 0;margin: 1rem;" id="ClickBtnLoadingPAge">Click</p>
    </section>
    <section style="background-color: black;">
        <p style="color: white;" id="UserInfo">User Info</p>

    </section>

    <script src="./js/main.js"></script>
</body>

</html>
